# ═══════════════════════════════════════════════════════════════
# Elyria Server Configuration
# ═══════════════════════════════════════════════════════════════
# Ce fichier initialise le serveur. Pas de .env nécessaire.
# Modifiable à chaud via l'UI admin (stocké en DB app_config).
#
# Format : sections INI. Les commentaires commencent par #.
# Pour override par env var : ELYRIA_SERVER_HOST → [server].host

[server]
# Adresse d'écoute et port
host = 127.0.0.1
port = 8000
# Hot reload (désactiver en production)
reload = 1

[ssl]
# Chemins des certificats (laisser vide si pas de TLS)
cert_path = cert.pem
key_path = key.pem
# Vérification SSL pour les requêtes sortantes (0 = dev, 1 = prod)
verify = 0

[database]
# Backend : sqlite ou postgres
backend = sqlite
sqlite_path = database.db
# PostgreSQL (utilisé si backend = postgres)
pg_host = localhost
pg_port = 5432
pg_database = elyria
pg_user = elyria
pg_password = elyria
pool_min = 2
pool_max = 10

[logging]
# Niveau : DEBUG, INFO, WARNING, ERROR
level = INFO
# Dossier des logs (relatif au dossier app/)
dir = logs

[oidc]
# SSO / OIDC (optionnel)
enabled = 0
provider_name =
issuer =
client_id =
client_secret =
scope = openid profile email
button_label = Connexion SSO

[security]
# Clé de chiffrement serveur (64 chars hex). Générée automatiquement si absente.
# ⚠️ En production : mettez une valeur fixe pour ne pas perdre les données au restart.
server_wrap_key =
# Hosts bloqués pour les requêtes sortantes (SSRF protection)
blocked_hosts = metadata.google.internal,169.254.169.254,instance-data,host.docker.internal,gateway.docker.internal
