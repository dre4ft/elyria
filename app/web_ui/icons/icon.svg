<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hexagone extérieur (segment haut-droit → droite en pointillés) -->
  <polygon points="62,32 47,57.98 17,57.98 2,32 17,6.02 47,6.02"
    stroke="#94a3b8" stroke-width="2" stroke-linejoin="round"/>
  <!-- Porte d'entrée / faille : le dernier côté (top-right → right) est absent -->
  <line x1="47" y1="6.02" x2="62" y2="32"
    stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- Rayons (5 pleins + 1 haché) -->
  <line x1="32" y1="32" x2="62" y2="32" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="32" y1="32" x2="47" y2="57.98" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="32" y1="32" x2="17" y2="57.98" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="32" y1="32" x2="2" y2="32" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="32" y1="32" x2="17" y2="6.02" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="32" y1="32" x2="47" y2="6.02" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3.5"/>

  <!-- Niveau 1 (r=22) -->
  <polygon points="54,32 43,51.05 21,51.05 10,32 21,12.95 43,12.95"
    stroke="#94a3b8" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="43" y1="12.95" x2="54" y2="32"
    stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- Niveau 2 (r=14) -->
  <polygon points="46,32 39,44.12 25,44.12 18,32 25,19.88 39,19.88"
    stroke="#94a3b8" stroke-width="1" stroke-linejoin="round"/>

  <!-- Niveau 3 (r=7) -->
  <polygon points="39,32 35.5,38.06 28.5,38.06 25,32 28.5,25.94 35.5,25.94"
    stroke="#94a3b8" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Nœuds niveau 1 -->
  <circle cx="54" cy="32" r="1.2" fill="#64748b"/>
  <circle cx="43" cy="51.05" r="1.2" fill="#64748b"/>
  <circle cx="21" cy="51.05" r="1.2" fill="#64748b"/>
  <circle cx="10" cy="32" r="1.2" fill="#64748b"/>
  <circle cx="21" cy="12.95" r="1.2" fill="#64748b"/>
  <circle cx="43" cy="12.95" r="1.2" fill="#64748b"/>

  <!-- Nœuds niveau 2 -->
  <circle cx="46" cy="32" r="1" fill="#64748b"/>
  <circle cx="39" cy="44.12" r="1" fill="#64748b"/>
  <circle cx="25" cy="44.12" r="1" fill="#64748b"/>
  <circle cx="18" cy="32" r="1" fill="#64748b"/>
  <circle cx="25" cy="19.88" r="1" fill="#64748b"/>
  <circle cx="39" cy="19.88" r="1" fill="#64748b"/>

  <!-- Nœud central -->
  <circle cx="32" cy="32" r="2" fill="#64748b"/>
</svg>
