<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elyria — Documentation</title>
  <link rel="icon" type="image/svg+xml" href="/static/icons/favicon.svg" />
  <link rel="alternate icon" type="image/x-icon" href="/static/icons/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: { 900:'#0a0f1c', 800:'#0f1629', 700:'#141c35', 600:'#1a2340', 500:'#212b4a' },
            primary: { DEFAULT:'#7c3aed', light:'#8b5cf6', dark:'#6d28d9', 50:'rgba(124,58,237,0.08)', 100:'rgba(124,58,237,0.15)' },
            accent:  { DEFAULT:'#06b6d4', light:'#22d3ee', dark:'#0891b2', 50:'rgba(6,182,212,0.08)', 100:'rgba(6,182,212,0.15)' },
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Scrollbar ── */
    .scrollbar-thin::-webkit-scrollbar { width: 4px; height: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 999px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    /* ── Markdown Content ── */
    .md-content h1 {
      font-size: 1.75rem; font-weight: 700; color: #f3f4f6; margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06); letter-spacing: -0.02em;
    }
    .md-content h2 {
      font-size: 1.25rem; font-weight: 600; color: #e5e7eb; margin-top: 2.5rem; margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    .md-content h3 {
      font-size: 1.05rem; font-weight: 600; color: #d1d5db; margin-top: 1.75rem; margin-bottom: 0.5rem;
    }
    .md-content h4 {
      font-size: 0.95rem; font-weight: 600; color: #9ca3af; margin-top: 1.25rem; margin-bottom: 0.375rem;
    }
    .md-content p {
      color: #9ca3af; line-height: 1.75; margin-bottom: 0.75rem;
    }
    .md-content a {
      color: #8b5cf6; text-decoration: underline; text-underline-offset: 2px;
    }
    .md-content a:hover { color: #a78bfa; }
    .md-content strong { color: #d1d5db; font-weight: 600; }
    .md-content em { color: #c4b5fd; }

    .md-content ul, .md-content ol {
      margin-bottom: 1rem; padding-left: 1.5rem; color: #9ca3af; line-height: 1.8;
    }
    .md-content ul { list-style-type: disc; }
    .md-content ol { list-style-type: decimal; }
    .md-content li { margin-bottom: 0.25rem; }
    .md-content li::marker { color: #4b5563; }

    .md-content table {
      width: 100%; border-collapse: collapse; margin: 1.25rem 0; font-size: 0.85rem;
    }
    .md-content thead { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .md-content th {
      text-align: left; padding: 0.625rem 0.875rem; color: #9ca3af; font-weight: 600;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .md-content td {
      padding: 0.5rem 0.875rem; color: #d1d5db; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .md-content tr:hover td { background: rgba(255,255,255,0.02); }

    .md-content code {
      background: rgba(124,58,237,0.12); color: #c4b5fd; padding: 0.125rem 0.375rem;
      border-radius: 0.25rem; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
    }
    .md-content pre {
      background: rgba(10,15,28,0.6); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0.5rem; padding: 1rem 1.25rem; margin: 1rem 0; overflow-x: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.65;
    }
    .md-content pre code {
      background: none; color: #d1d5db; padding: 0; font-size: inherit;
    }

    .md-content blockquote {
      border-left: 3px solid #7c3aed; padding: 0.625rem 1rem; margin: 1rem 0;
      background: rgba(124,58,237,0.06); border-radius: 0 0.375rem 0.375rem 0;
      color: #9ca3af; font-style: italic;
    }

    .md-content hr {
      border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 2.5rem 0;
    }

    .md-content img { max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; }

    /* ── Sidebar TOC ── */
    .toc-link {
      display: block; padding: 0.25rem 0.625rem; border-radius: 0.25rem; font-size: 0.75rem;
      color: #6b7280; transition: all 0.15s; border-left: 2px solid transparent;
    }
    .toc-link:hover { color: #d1d5db; background: rgba(255,255,255,0.03); }
    .toc-link.active { color: #c4b5fd; background: rgba(124,58,237,0.08); border-left-color: #7c3aed; }
    .toc-link.h3 { padding-left: 1.5rem; font-size: 0.7rem; }
  </style>
</head>
<body class="h-full bg-base-900 text-gray-200 font-['Inter',sans-serif] overflow-hidden">

  <!-- ===== TOP BAR ===== -->
  <header class="h-12 bg-base-800 border-b border-white/5 flex items-center justify-between px-5 shrink-0 z-50 relative">
    <!-- LEFT: Logo + Feature nav -->
    <div class="flex items-center gap-2">
      <a href="/app" class="flex items-center gap-2 no-underline flex-shrink-0">
        <img src="/static/icons/icon.svg" class="w-7 h-7" alt="" />
        <span class="text-sm font-medium tracking-widest text-slate-400">elyria</span>
      </a>
      <div class="w-px h-5 bg-white/10"></div>
      <nav class="flex items-center gap-1">
        <button onclick="navigateTo('/app')" class="h-7 px-2.5 rounded-md text-[11px] text-gray-500 hover:text-cyan-400 hover:bg-cyan-500/5 transition-all">Client API</button>
        <button onclick="navigateTo('/workflow')" class="h-7 px-2.5 rounded-md text-[11px] text-gray-500 hover:text-green-400 hover:bg-green-500/5 transition-all">Workflows</button>
        <button onclick="navigateTo('/pentest')" class="h-7 px-2.5 rounded-md text-[11px] text-gray-500 hover:text-red-400 hover:bg-red-500/5 transition-all">Red Team</button>
        <button onclick="navigateTo('/blueteam')" class="h-7 px-2.5 rounded-md text-[11px] text-gray-500 hover:text-blue-400 hover:bg-blue-500/5 transition-all">Blue Team</button>
      </nav>
    </div>
    <!-- CENTER: Page context -->
    <div class="flex items-center gap-2">
      <svg class="w-4 h-4 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
      <span class="text-xs font-semibold text-accent-light">Documentation</span>
      <div class="w-px h-5 bg-white/10"></div>
      <div id="lang-switcher" class="flex items-center bg-base-900/60 rounded-md p-0.5 gap-0.5">
        <button data-lang="fr" class="lang-btn h-6 px-2 rounded text-[10px] font-semibold transition-all">FR</button>
        <button data-lang="en" class="lang-btn h-6 px-2 rounded text-[10px] font-semibold transition-all">EN</button>
      </div>
    </div>
    <!-- RIGHT: User -->
    <div class="flex items-center gap-2">
      <button onclick="navigateTo('/hub')" class="h-8 px-3 rounded-lg bg-base-700 hover:bg-primary/15 border border-white/5 hover:border-primary/30 text-xs font-medium text-gray-400 hover:text-primary-light transition-all" title="Hub">Hub</button>
      <span id="header-username" class="text-[10px] text-gray-500 font-medium hidden"></span>
      <button id="btn-logout" class="h-8 px-3 rounded-lg bg-base-700 hover:bg-red-500/10 border border-white/5 hover:border-red-500/30 text-gray-500 hover:text-red-400 text-xs font-medium transition-all" title="Deconnexion">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="flex h-[calc(100vh-3rem)]">

    <!-- ===== LEFT — TABLE OF CONTENTS ===== -->
    <aside class="w-56 min-w-[220px] bg-base-800 border-r border-white/5 flex flex-col shrink-0 overflow-hidden">
      <div class="p-3 border-b border-white/5">
        <span class="text-[10px] uppercase tracking-widest text-gray-500 font-semibold">Sommaire</span>
      </div>
      <nav id="toc" class="flex-1 overflow-y-auto p-2 space-y-0.5 scrollbar-thin">
        <!-- Populated by JS -->
      </nav>
    </aside>

    <!-- ===== CENTER — DOC CONTENT ===== -->
    <main class="flex-1 overflow-y-auto scrollbar-thin">
      <div id="md-content" class="md-content max-w-3xl mx-auto px-8 py-8">
        <!-- Populated by JS after fetching and parsing MD -->
      </div>
    </main>

  </div>

  <script src="static/auth.js"></script>
  <script>
    const esc = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
    // ── State ──
    let currentLang = 'fr';

    // ── Init ──
    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      initAuth();

      initHeaderUser();

      // Read lang from URL query param
      const params = new URLSearchParams(window.location.search);
      currentLang = params.get('lang') === 'en' ? 'en' : 'fr';

      setupLangSwitcher();
      await loadDoc();
      setupTocObserver();
    }

    // ── Language switcher ──
    function setupLangSwitcher() {
      document.querySelectorAll('.lang-btn').forEach(btn => {
        const isActive = btn.dataset.lang === currentLang;
        btn.classList.toggle('bg-primary/20', isActive);
        btn.classList.toggle('text-primary-light', isActive);
        btn.classList.toggle('text-gray-500', !isActive);
        btn.classList.toggle('hover:text-gray-300', !isActive);
        btn.classList.toggle('hover:bg-white/5', !isActive);

        btn.addEventListener('click', () => {
          if (btn.dataset.lang === currentLang) return;
          currentLang = btn.dataset.lang;
          const url = new URL(window.location);
          url.searchParams.set('lang', currentLang);
          window.history.replaceState({}, '', url);
          setupLangSwitcher();
          loadDoc();
        });
      });
    }

    // ── Fetch & render ──
    async function loadDoc() {
      const container = document.getElementById('md-content');
      const toc = document.getElementById('toc');

      // Clear previous
      toc.innerHTML = '';
      container.innerHTML = '';

      try {
        const res = await fetch(`/api/doc?lang=${currentLang}`, { headers: { ...getAuthHeader() } });
        if (!res.ok) throw new Error('Failed to load doc');
        const data = await res.json();

        const html = marked.parse(data.content);
        container.innerHTML = html;

        // Build table of contents from headings
        buildToc(container, toc);
      } catch (err) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center py-20 text-center">
            <div class="w-12 h-12 rounded-2xl bg-base-700 flex items-center justify-center mb-4">
              <svg class="w-6 h-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
            </div>
            <p class="text-sm text-gray-500">${currentLang === 'en' ? 'Unable to load documentation.' : 'Impossible de charger la documentation.'}</p>
            <p class="text-xs text-gray-600 mt-1">${esc(err.message)}</p>
          </div>
        `;
      }
    }

    function buildToc(container, tocEl) {
      const headings = container.querySelectorAll('h2, h3');
      if (headings.length === 0) return;

      headings.forEach((h, i) => {
        const id = `heading-${i}`;
        h.id = id;

        const link = document.createElement('a');
        link.className = 'toc-link' + (h.tagName === 'H3' ? ' h3' : '');
        link.href = `#${id}`;
        link.textContent = h.textContent;
        link.addEventListener('click', (e) => {
          e.preventDefault();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        tocEl.appendChild(link);
      });
    }

    function setupTocObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll('.toc-link').forEach(link => {
              const active = link.getAttribute('href') === `#${entry.target.id}`;
              link.classList.toggle('active', active);
            });
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px' });

      // Re-observe after a short delay to let DOM settle
      setTimeout(() => {
        document.querySelectorAll('.md-content h2, .md-content h3').forEach(h => {
          observer.observe(h);
        });
      }, 200);
    }
  </script>
</body>
</html>
