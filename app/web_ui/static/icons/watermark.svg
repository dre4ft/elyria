<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <g stroke="#94a3b8" stroke-opacity="0.08">
    <!-- Hexagone extérieur -->
    <polygon points="194,100 147,181.4 53,181.4 6,100 53,18.6 147,18.6"
      stroke-width="6" stroke-linejoin="round"/>
    <line x1="147" y1="18.6" x2="194" y2="100"
      stroke-width="6" stroke-dasharray="15 12"/>

    <!-- Rayons -->
    <line x1="100" y1="100" x2="194" y2="100" stroke-width="4.5"/>
    <line x1="100" y1="100" x2="147" y2="181.4" stroke-width="4.5"/>
    <line x1="100" y1="100" x2="53" y2="181.4" stroke-width="4.5"/>
    <line x1="100" y1="100" x2="6" y2="100" stroke-width="4.5"/>
    <line x1="100" y1="100" x2="53" y2="18.6" stroke-width="4.5"/>
    <line x1="100" y1="100" x2="147" y2="18.6" stroke-width="4.5" stroke-dasharray="12 10"/>

    <!-- Niveau 1 -->
    <polygon points="169,100 134.5,159.8 65.5,159.8 31,100 65.5,40.2 134.5,40.2"
      stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="134.5" y1="40.2" x2="169" y2="100"
      stroke-width="3.5" stroke-dasharray="12 9"/>

    <!-- Niveau 2 -->
    <polygon points="144,100 122,138.1 78,138.1 56,100 78,61.9 122,61.9"
      stroke-width="3" stroke-linejoin="round"/>

    <!-- Niveau 3 -->
    <polygon points="122,100 111,119.1 89,119.1 78,100 89,80.9 111,80.9"
      stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- Nœuds -->
  <g fill="#64748b" fill-opacity="0.10">
    <circle cx="169" cy="100" r="3.5"/><circle cx="134.5" cy="159.8" r="3.5"/>
    <circle cx="65.5" cy="159.8" r="3.5"/><circle cx="31" cy="100" r="3.5"/>
    <circle cx="65.5" cy="40.2" r="3.5"/><circle cx="134.5" cy="40.2" r="3.5"/>
    <circle cx="144" cy="100" r="3"/><circle cx="122" cy="138.1" r="3"/>
    <circle cx="78" cy="138.1" r="3"/><circle cx="56" cy="100" r="3"/>
    <circle cx="78" cy="61.9" r="3"/><circle cx="122" cy="61.9" r="3"/>
    <circle cx="100" cy="100" r="5"/>
  </g>
</svg>
